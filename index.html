<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Alke Wallet | Inicio de Sesión</title>

    
    <!-- Bootstrap mediante CDN                                -->
    <!-- Se utilizará para el diseño responsive.   -->
    <!-- usaremos bootstrap 5.3.3, la última versión estable. -->   
    

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    
    <!-- Hoja de estilos principal del proyecto styles.css   -->
    

    <link rel="stylesheet" href="css/styles.css">

</head>

<body>

    
    <!-- Container principal                       -->
    <!-- Bootstrap centra el formulario            -->
    

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-md-5">

                <div class="card shadow mt-5">

                    <div class="card-body">

                        
                        <!-- Logo y título                             -->
                        

                        <div class="text-center mb-4">

                            <h1 class="logo">

                                Alke Wallet

                            </h1>

                            <p class="text-muted">

                                Bienvenido nuevamente

                            </p>

                        </div>

                        
                        <!-- Contenedor donde JQuery mostrará mensajes -->
                        

                        <div id="mensaje"></div>

                        
                        <!-- Formulario Login                          -->
                        <!-- Todo será controlado desde app.js         -->
                        

                        <form id="loginForm">

                            <!-- Correo -->

                            <div class="mb-3">

                                <label
                                    for="correo"
                                    class="form-label">

                                    Correo Electrónico

                                </label>

                                <input
                                    type="email"
                                    id="correo"
                                    class="form-control"

                                    placeholder="Correo de prueba (bootcamp@gmail.com)"

                                    required>

                            </div>

                            <!-- Contraseña -->

                            <div class="mb-4">

                                <label
                                    for="password"
                                    class="form-label">

                                    Contraseña

                                </label>

                                <input
                                    type="password"
                                    id="password"
                                    class="form-control"

                                    placeholder="Contraseña de prueba (java2026)"

                                    required>

                            </div>

                            <!-- Botón Login de Iniciar Sesión -->

                            <button
                                type="submit"
                                id="btnLogin"
                                class="btn btn-primary w-100">

                                Iniciar Sesión

                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

    
    <!-- JQuery                                    -->
    <!-- Debe cargarse antes de app.js             -->
    

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    
    <!-- Archivo JavaScript principal              -->
    <!-- Aquí estará toda la lógica del proyecto   -->
    

    <script src="js/app.js"></script>

</body>

</html>
